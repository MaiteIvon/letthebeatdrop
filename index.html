<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Let the Beat DROP 🎤</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #fdf6ec 0%, #fce7f3 100%); min-height: 100vh; padding: 16px; }
.app { max-width: 520px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 16px; }
.header h1 { font-size: 24px; font-weight: 900; color: #1f2937; font-family: Georgia, serif; }
.header p { font-size: 13px; color: #6b7280; margin-top: 4px; }
.nav { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.nav button { padding: 4px 12px; border-radius: 9999px; font-size: 11px; font-weight: 700; border: 2px solid #f9a8d4; background: white; color: #6b7280; cursor: pointer; }
.nav button.active { background: linear-gradient(90deg, #f59e0b, #ec4899); color: white; border-color: transparent; }
.screen { display: none; }
.screen.active { display: block; }
.card { background: white; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.07); padding: 20px; border: 2px solid #fde68a; margin-bottom: 16px; }
.card h2 { font-size: 18px; font-weight: 900; color: #1f2937; margin-bottom: 8px; }
label { display: block; font-size: 13px; font-weight: 700; color: #374151; margin-bottom: 4px; margin-top: 12px; }
input, textarea { width: 100%; border: 2px solid #fde68a; border-radius: 12px; padding: 8px 12px; font-size: 13px; outline: none; font-family: inherit; }
input:focus, textarea:focus { border-color: #ec4899; }
.btn { display: block; width: 100%; padding: 12px; border-radius: 12px; font-weight: 900; font-size: 14px; color: white; border: none; cursor: pointer; margin-top: 12px; text-align: center; }
.btn-main { background: linear-gradient(90deg, #f59e0b, #ec4899); }
.btn-yt { background: linear-gradient(90deg, #ff0000, #cc0000); }
.btn-gmail { background: linear-gradient(90deg, #6366f1, #ec4899); }
.btn-green { background: #22c55e; }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-row { display: flex; gap: 8px; margin-top: 12px; }
.btn-row .btn { margin-top: 0; }
.msg { border-radius: 12px; padding: 10px 12px; font-size: 12px; margin-top: 8px; }
.msg-info { background: #fdf3ff; border: 2px solid #f0abfc; color: #a21caf; font-weight: 700; }
.msg-success { background: #f0fdf4; border: 2px solid #86efac; color: #15803d; }
.msg-error { background: #fef2f2; border: 2px solid #fca5a5; color: #dc2626; }
.playlist-card { border-radius: 16px; overflow: hidden; box-shadow: 0 8px 16px rgba(0,0,0,0.1); border: 4px solid #fde68a; margin-top: 16px; }
.pl-header { padding: 20px; text-align: center; background: linear-gradient(90deg, #f59e0b, #ec4899); }
.pl-header h2 { color: white; font-weight: 900; font-size: 20px; font-family: Georgia, serif; text-shadow: 1px 1px 3px rgba(0,0,0,0.3); }
.pl-header p { color: #fef9c3; font-size: 13px; margin-top: 4px; }
.pl-body { background: linear-gradient(135deg, #fff9e6 0%, #fff0f5 100%); padding: 16px; }
.vibe { text-align: center; margin-bottom: 12px; }
.vibe span { background: #ec4899; color: white; font-size: 13px; font-weight: 700; padding: 4px 16px; border-radius: 9999px; }
.note-box { padding: 10px; border-radius: 12px; border: 2px dashed #f9a8d4; background: #fff0f8; text-align: center; font-style: italic; font-size: 13px; color: #6b7280; margin-bottom: 12px; }
.song-list-label { font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #6b7280; margin-bottom: 8px; }
.song-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px; border-radius: 8px; margin-bottom: 4px; }
.song-item:nth-child(odd) { background: #fff9e6; }
.song-item:nth-child(even) { background: #fff0f8; }
.song-num { font-weight: 900; font-size: 16px; min-width: 24px; }
.song-link { color: #2563eb; text-decoration: none; font-weight: 600; font-size: 13px; }
.song-link:hover { text-decoration: underline; }
.anchor-badge { font-size: 11px; color: #f472b6; font-weight: 700; margin-left: 6px; }
.hearts { text-align: center; padding: 12px; color: #f472b6; font-size: 18px; }
.pl-actions { display: flex; flex-direction: column; gap: 8px; padding-bottom: 8px; }
.blocklist-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-radius: 8px; margin-bottom: 4px; }
.blocklist-item:nth-child(odd) { background: #fff9e6; }
.blocklist-item:nth-child(even) { background: #fff0f8; }
.unblock-btn { font-size: 11px; color: #f87171; font-weight: 700; background: none; border: none; cursor: pointer; }
.rate-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-radius: 8px; margin-bottom: 4px; }
.rate-item:nth-child(odd) { background: #fff9e6; }
.rate-item:nth-child(even) { background: #fff0f8; }
.rate-btns { display: flex; gap: 4px; }
.rate-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #e5e7eb; background: white; cursor: pointer; font-size: 14px; }
.rate-btn.selected { border-color: #ec4899; background: #fce7f3; }
.hint { background: #fffbeb; border: 2px solid #fde68a; border-radius: 12px; padding: 12px; margin-top: 12px; font-size: 12px; color: #92400e; line-height: 1.8; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div style="font-size:40px;margin-bottom:8px">🎸</div>
    <h1>Let the Beat DROP 🎤</h1>
    <p>A little love note in music form 💕</p>
  </div>
  <div class="nav" id="nav"></div>
  <div id="screen-generate" class="screen"></div>
  <div id="screen-profile" class="screen"></div>
  <div id="screen-blocklist" class="screen"></div>
  <div id="screen-setup" class="screen"></div>
  <div id="screen-rate" class="screen"></div>
</div>

<script>
const DEFAULT_PROFILE = {
  artists: "Bob Dylan, Tom Petty, Blues Traveler, Pearl Jam, Chappell Roan, Garth Brooks, Brooks and Dunn, Dwight Yoakam, The Mavericks, Fleetwood Mac, Alanis Morissette, Green Day, Bob Seger and The Silver Bullet Band, Jimmy Buffett, Jim Croce, Joni Mitchell, Paul Simon, Billy Joel, The Kinks, Old Crow Medicine Show, Bee Gees, ABBA, The Temptations, Frankie Valli and The Four Seasons, Neil Diamond, Matchbox 20, Dr. Dre, Snoop Dogg, Dua Lipa, Sabrina Carpenter, Doja Cat, Johnny Cash, Gary Allan, George Strait, Randy Travis, Go West, Elton John, Cher, Crosby Stills and Nash, The Band, Hootie and the Blowfish, Diamond Rio, BlackHawk, Toby Keith, America, Toto, Cat Stevens, REO Speedwagon, Guns N Roses, Foreigner",
  favSongs: "Tangled Up in Blue by Bob Dylan, Hook by Blues Traveler, Wagon Wheel by Old Crow Medicine Show, Maria Shut Up and Kiss Me by Willie Nelson, Red Red Wine by Neil Diamond, Daughter by Pearl Jam, Neon Moon by Brooks and Dunn, 3 AM by Matchbox 20, After Midnight by Chappell Roan, The Subway by Chappell Roan, Go to Town by Doja Cat, Cecelia by Simon and Garfunkel, Laid by James, Regulate by Warren G and Nate Dogg, Dre Day by Dr. Dre, Jump Around by House of Pain, Insane in the Brain by Cypress Hill, Silver Spring by Fleetwood Mac, I Cant Dance by Genesis, Heartache Tonight by Eagles, Still the Same by Bob Seger, Daddy Sang Bass by Johnny Cash, Jackson by Johnny Cash and June Carter Cash, Cocaine Blues by Johnny Cash, Airplanes by Gary Allan, Nothing On But the Radio by Gary Allan, Songs About Rain by Gary Allan, Forever and Ever Amen by Randy Travis, I Can Still Make Cheyenne by George Strait, King of Wishful Thinking by Go West, Sad Songs Say So Much by Elton John, If I Could Turn Back Time by Cher, Southern Cross by Crosby Stills and Nash, Time by Hootie and the Blowfish, Norma Jean Riley by Diamond Rio, Ventura Highway by America, Africa by Toto",
  dislikes: "R and B, jazz, Bruce Springsteen, P Diddy, Puff Daddy, Diddy, Sean Combs, Faith Evans, 112",
  notes: "Jon loves music across every genre and era. Always singing to himself. Lean toward upbeat singable anthemic songs. For hip-hop stick to classic West Coast rap like Dr Dre Snoop Cypress Hill Warren G. Deep cuts welcome for Bob Dylan, Chappell Roan, Paul Simon, Johnny Cash, Tom Petty, Fleetwood Mac, Neil Diamond, The Mavericks, Dwight Yoakam, The Band, Cat Stevens. For Crosby Stills and Nash stick to hits plus Southern Cross. For all others stick to well known hits only."
};

const DEFAULT_OVERPLAYED = ["Homeward Bound","Take It Easy","Take Me Home Country Roads","Home","The Weight"];

let state = {
  screen: "generate",
  profile: null,
  ratings: {},
  lastPlaylist: [],
  blocklist: null,
  clientId: "",
  apiKey: "",
  accessToken: "",
  songs: [],
  ytUrl: ""
};

// Load from localStorage
try { state.profile = JSON.parse(localStorage.getItem("jon-profile")) || DEFAULT_PROFILE; } catch(e) { state.profile = DEFAULT_PROFILE; }
try { state.ratings = JSON.parse(localStorage.getItem("jon-ratings")) || {}; } catch(e) { state.ratings = {}; }
try { state.lastPlaylist = JSON.parse(localStorage.getItem("last-playlist")) || []; } catch(e) { state.lastPlaylist = []; }
try { state.blocklist = JSON.parse(localStorage.getItem("blocklist")) || DEFAULT_OVERPLAYED; } catch(e) { state.blocklist = DEFAULT_OVERPLAYED; }
state.clientId = localStorage.getItem("yt-client-id") || "";
state.apiKey = localStorage.getItem("anthropic-key") || "";
state.accessToken = localStorage.getItem("yt-access-token") || "";

// Check for OAuth token in URL
(function() {
  var h = window.location.hash;
  if (h && h.includes("access_token")) {
    var params = new URLSearchParams(h.substring(1));
    var token = params.get("access_token");
    if (token) {
      state.accessToken = token;
      localStorage.setItem("yt-access-token", token);
      window.history.replaceState(null, "", window.location.pathname);
      if (localStorage.getItem("pending-yt-save") === "true" && state.lastPlaylist.length > 0) {
        localStorage.removeItem("pending-yt-save");
        state.songs = state.lastPlaylist;
        setTimeout(function() {
          renderPlaylistCard("", "", 0);
          setTimeout(function() { createYouTubePlaylist("", ""); }, 500);
        }, 200);
      }
    }
  }
})();

function save(key, val) {
  try {
    localStorage.setItem(key, typeof val === "object" ? JSON.stringify(val) : val);
  } catch(e) {}
}

function setScreen(s) {
  state.screen = s;
  renderNav();
  document.querySelectorAll(".screen").forEach(function(el) { el.classList.remove("active"); });
  document.getElementById("screen-" + s).classList.add("active");
}

function renderNav() {
  var tabs = [
    {id:"generate", label:"🎶 Create"},
    {id:"profile", label:"⭐ Profile"},
    {id:"blocklist", label:"🚫 Blocklist"},
    {id:"setup", label: state.clientId ? "⚙️ Setup ✓" : "⚙️ Setup"}
  ];
  if (state.lastPlaylist.length > 0) tabs.push({id:"rate", label:"📊 Rate"});
  document.getElementById("nav").innerHTML = tabs.map(function(t) {
    return '<button class="' + (state.screen===t.id?'active':'') + '" onclick="setScreen(\'' + t.id + '\')">' + t.label + '</button>';
  }).join("");
}

function renderSetup() {
  document.getElementById("screen-setup").innerHTML =
    '<div class="card"><h2>⚙️ Setup</h2>' +
    (state.accessToken ? '<div class="msg msg-success">✓ Signed in to YouTube Music! <button onclick="signOutYT()" style="margin-left:8px;background:none;border:none;color:#dc2626;font-weight:700;cursor:pointer">Sign out</button></div>' : '') +
    '<label>Anthropic API Key</label>' +
    '<input type="password" id="inp-apikey" placeholder="sk-ant-..." value="' + state.apiKey + '">' +
    '<label>Google OAuth Client ID</label>' +
    '<input type="password" id="inp-clientid" placeholder="Ends in .googleusercontent.com" value="' + state.clientId + '">' +
    '<button class="btn btn-main" onclick="saveSetup()">💾 Save</button>' +
    '<div class="hint">Get your Anthropic API Key from console.anthropic.com under API Keys.<br>Get your Google Client ID from Google Cloud Console under Credentials.</div>' +
    '</div>';
}

function saveSetup() {
  state.apiKey = document.getElementById("inp-apikey").value.trim();
  state.clientId = document.getElementById("inp-clientid").value.trim();
  save("anthropic-key", state.apiKey);
  save("yt-client-id", state.clientId);
  renderNav();
  renderSetup();
  alert("Saved!");
}

function signOutYT() {
  state.accessToken = "";
  localStorage.removeItem("yt-access-token");
  renderSetup();
}

function renderProfile() {
  document.getElementById("screen-profile").innerHTML =
    '<div class="card"><h2>⭐ Jon\'s Music Profile</h2>' +
    '<label>🎸 Favorite Artists</label><textarea rows="4" id="p-artists">' + state.profile.artists + '</textarea>' +
    '<label>💿 Favorite Songs</label><textarea rows="4" id="p-favSongs">' + state.profile.favSongs + '</textarea>' +
    '<label>🚫 Dislikes</label><textarea rows="2" id="p-dislikes">' + state.profile.dislikes + '</textarea>' +
    '<label>📝 Notes</label><textarea rows="3" id="p-notes">' + state.profile.notes + '</textarea>' +
    '<button class="btn btn-main" onclick="saveProfile()">💾 Save Profile</button></div>';
}

function saveProfile() {
  state.profile = {
    artists: document.getElementById("p-artists").value,
    favSongs: document.getElementById("p-favSongs").value,
    dislikes: document.getElementById("p-dislikes").value,
    notes: document.getElementById("p-notes").value
  };
  save("jon-profile", state.profile);
  alert("Saved!");
}

function renderBlocklist() {
  var items = state.blocklist.map(function(s, i) {
    return '<div class="blocklist-item"><span style="font-size:13px;color:#374151">' + s + '</span><button class="unblock-btn" onclick="unblock(' + i + ')">✕ Unblock</button></div>';
  }).join("");
  document.getElementById("screen-blocklist").innerHTML =
    '<div class="card"><h2>🚫 Blocked Songs</h2>' +
    '<p style="font-size:12px;color:#6b7280;margin-bottom:8px">All generated songs auto-added here. Unblock when ready!</p>' +
    '<div style="display:flex;gap:8px"><input id="bl-input" placeholder="Add a song title..." style="flex:1" onkeydown="if(event.key===\'Enter\')addBlock()"><button class="btn btn-main" onclick="addBlock()" style="width:auto;padding:8px 16px;margin-top:0">Add</button></div>' +
    '<div style="margin-top:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:11px;font-weight:700;color:#6b7280">BLOCKED (' + state.blocklist.length + ')</span>' +
    (state.blocklist.length > 0 ? '<button onclick="clearBlocklist()" style="font-size:11px;color:#f87171;font-weight:700;background:none;border:none;cursor:pointer">🗑 Clear All</button>' : '') +
    '</div>' + (state.blocklist.length === 0 ? '<p style="font-size:12px;color:#9ca3af;font-style:italic">No songs blocked yet.</p>' : items) + '</div></div>';
}

function addBlock() {
  var val = document.getElementById("bl-input").value.trim();
  if (!val) return;
  state.blocklist = Array.from(new Set(state.blocklist.concat([val])));
  save("blocklist", state.blocklist);
  renderBlocklist();
}

function unblock(i) {
  state.blocklist.splice(i, 1);
  save("blocklist", state.blocklist);
  renderBlocklist();
}

function clearBlocklist() {
  if (confirm("Clear all blocked songs?")) {
    state.blocklist = [];
    save("blocklist", state.blocklist);
    renderBlocklist();
  }
}

function renderRate() {
  if (!state.lastPlaylist.length) {
    document.getElementById("screen-rate").innerHTML = '<div class="card"><p style="text-align:center;color:#6b7280">Generate a playlist first!</p></div>';
    return;
  }
  var items = state.lastPlaylist.map(function(song, i) {
    var r = state.ratings[song] || "";
    var btns = [["❤️","loved"],["👍","liked"],["👎","skip"]].map(function(x) {
      return '<button class="rate-btn ' + (r===x[1]?'selected':'') + '" onclick="rateSong(' + i + ',\'' + x[1] + '\')">' + x[0] + '</button>';
    }).join("");
    return '<div class="rate-item"><span style="font-size:12px;color:#374151;flex:1;margin-right:8px">' + song + '</span><div class="rate-btns">' + btns + '</div></div>';
  }).join("");
  document.getElementById("screen-rate").innerHTML =
    '<div class="card"><h2>📊 Rate Last Playlist</h2><p style="font-size:12px;color:#6b7280;margin-bottom:12px">How did Jon react?</p>' + items +
    '<button class="btn btn-main" onclick="saveRatings()">💾 Save Ratings</button></div>';
}

function rateSong(i, val) {
  state.ratings[state.lastPlaylist[i]] = val;
  renderRate();
}

function saveRatings() {
  save("jon-ratings", state.ratings);
  alert("Ratings saved!");
}

function renderGenerate() {
  document.getElementById("screen-generate").innerHTML =
    '<div class="card">' +
    '<label>🎨 Today\'s Mood or Theme *</label>' +
    '<input id="g-mood" placeholder="e.g. Rainy day cozy, Pump-up Friday, Thinking of you...">' +
    '<label>💌 A little note for Jon (optional)</label>' +
    '<input id="g-note" placeholder="e.g. Thinking of you today ♥">' +
    '<label>🎵 Your Picks (optional — up to 3)</label>' +
    '<input id="g-a1" placeholder="Song 1 — e.g. Free Bird by Lynyrd Skynyrd" style="margin-bottom:6px">' +
    '<input id="g-a2" placeholder="Song 2" style="margin-bottom:6px">' +
    '<input id="g-a3" placeholder="Song 3">' +
    '<div id="g-error" class="msg msg-error" style="display:none"></div>' +
    '<button class="btn btn-main" id="g-btn" onclick="generate()">🎶 Generate Playlist</button>' +
    '</div><div id="playlist-result"></div>';
}

function getRecentSongs() {
  try {
    var history = JSON.parse(localStorage.getItem("playlist-history") || "[]");
    var fiveDays = 5 * 24 * 60 * 60 * 1000;
    var recent = [];
    history.forEach(function(e) { if (Date.now() - e.timestamp < fiveDays) recent = recent.concat(e.songs); });
    var unique = Array.from(new Set(recent));
    var titles = Array.from(new Set(unique.map(function(s) { return s.split(" by ")[0].trim(); })));
    return { full: unique, titles: titles };
  } catch(e) { return { full: [], titles: [] }; }
}

function saveToHistory(songs) {
  try {
    var history = JSON.parse(localStorage.getItem("playlist-history") || "[]");
    history.push({ timestamp: Date.now(), songs: songs });
    var trimmed = history.filter(function(e) { return Date.now() - e.timestamp < 30*24*60*60*1000; });
    localStorage.setItem("playlist-history", JSON.stringify(trimmed));
  } catch(e) {}
}

function hardFilter(songList, recentTitles) {
  var allBlocked = Array.from(new Set(DEFAULT_OVERPLAYED.concat(state.blocklist).concat(recentTitles))).map(function(t) { return t.toLowerCase().trim(); });
  return songList.filter(function(s) {
    var title = s.split(" by ")[0].trim().toLowerCase();
    return !allBlocked.some(function(b) { return title === b; });
  });
}

function parseSongList(text) {
  // Parse numbered list: "1. Song by Artist" or "1. Song - Artist"
  var lines = text.split("\n");
  var songs = [];
  lines.forEach(function(line) {
    var clean = line.replace(/^\d+[\.\)]\s*/, "").trim();
    if (clean.length > 3) songs.push(clean);
  });
  return songs;
}

async function generate() {
  var mood = document.getElementById("g-mood").value.trim();
  var note = document.getElementById("g-note").value.trim();
  var picked = ["g-a1","g-a2","g-a3"].map(function(id) { return document.getElementById(id).value.trim(); }).filter(Boolean);
  var errEl = document.getElementById("g-error");

  if (!mood) { errEl.textContent = "Please enter a mood or theme!"; errEl.style.display = "block"; return; }
  if (!state.apiKey) { errEl.textContent = "Please add your Anthropic API key in Setup!"; errEl.style.display = "block"; return; }
  errEl.style.display = "none";

  var btn = document.getElementById("g-btn");
  btn.textContent = "✨ Building your playlist...";
  btn.disabled = true;

  var recent = getRecentSongs();
  var allBlocked = Array.from(new Set(DEFAULT_OVERPLAYED.concat(state.blocklist).concat(recent.titles)));
  var loved = Object.keys(state.ratings).filter(function(k) { return state.ratings[k] === "loved"; });
  var skipped = Object.keys(state.ratings).filter(function(k) { return state.ratings[k] === "skip"; });

  var prompt = "You are a music curator making a playlist for Jon who loves: " + state.profile.artists + "\n\n" +
    "His all-time favorite songs include: " + state.profile.favSongs + "\n\n" +
    "He dislikes: " + state.profile.dislikes + "\n\n" +
    "Notes: " + state.profile.notes + "\n\n" +
    (loved.length ? "Songs he loved recently: " + loved.slice(-10).join(", ") + "\n\n" : "") +
    (skipped.length ? "Songs to avoid (he skipped these): " + skipped.slice(-10).join(", ") + "\n\n" : "") +
    "Never suggest these songs: " + allBlocked.join(", ") + "\n\n" +
    "Today's mood/theme: " + mood + "\n" +
    (picked.length ? "Already chosen songs (do not repeat): " + picked.join(", ") + "\n" : "") +
    "\nSuggest " + (20 - picked.length) + " songs. Be creative and varied.\n\n" +
    "IMPORTANT: Reply with ONLY a simple numbered list. Each line must start with a number and period. Use this exact format:\n" +
    "1. Song Name by Artist Name\n" +
    "2. Song Name by Artist Name\n" +
    "Do not include any other text, explanation, or formatting.";

  try {
    var res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": state.apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1500,
        system: "You are a music playlist generator. You ONLY output numbered lists of songs. Never use JSON. Never use brackets. Format: 1. Song Name by Artist Name",
        messages: [{ role: "user", content: prompt }]
      })
    });
    var data = await res.json();
    if (data.error) throw new Error(data.error.message);
    var text = data.content.map(function(b) { return b.text || ""; }).join("");
    var suggested = parseSongList(text);
    var filtered = hardFilter(suggested, recent.titles);
    var allSongs = picked.concat(filtered).slice(0, 20);

    state.songs = allSongs;
    state.lastPlaylist = allSongs;
    state.ytUrl = "";
    save("last-playlist", allSongs);
    saveToHistory(allSongs);

    var newTitles = allSongs.map(function(s) { return s.split(" by ")[0].trim(); });
    state.blocklist = Array.from(new Set(state.blocklist.concat(newTitles)));
    save("blocklist", state.blocklist);

    renderNav();
    renderPlaylistCard(mood, note, picked.length);
  } catch(e) {
    errEl.textContent = "Error: " + e.message;
    errEl.style.display = "block";
  }

  btn.textContent = "🎶 Generate Playlist";
  btn.disabled = false;
}

function renderPlaylistCard(mood, note, pickedCount) {
  var today = new Date().toLocaleDateString("en-US", {weekday:"long",month:"long",day:"numeric"});
  var songItems = state.songs.map(function(song, i) {
    return '<div class="song-item">' +
      '<span class="song-num" style="color:' + (i < pickedCount ? '#ec4899' : '#f59e0b') + '">' + (i+1) + '.</span>' +
      '<span><a class="song-link" href="https://music.youtube.com/search?q=' + encodeURIComponent(song) + '" target="_blank">' + song + '</a>' +
      (i < pickedCount ? '<span class="anchor-badge">★ your pick</span>' : '') +
      '</span></div>';
  }).join("");

  var ytBtns = state.clientId ?
    '<button class="btn btn-yt" id="yt-btn" onclick="handleYouTube()">' +
    (state.accessToken ? "🎵 Save to YouTube Music" : "🎵 Sign in & Save to YouTube Music") +
    '</button><div id="yt-result"></div>' : "";

  document.getElementById("playlist-result").innerHTML =
    '<div class="playlist-card">' +
    '<div class="pl-header"><div style="font-size:32px;margin-bottom:4px">🎵</div><h2>Let the Beat DROP 🎤</h2><p>' + today + '</p></div>' +
    '<div class="pl-body">' +
    '<div class="vibe"><span>🎨 Today\'s Vibe: ' + mood + '</span></div>' +
    (note ? '<div class="note-box">💌 "' + note + '"</div>' : '') +
    '<div class="song-list-label">🎶 Your Playlist</div>' +
    songItems +
    '<div class="hearts">♥ ♪ ♥ ♪ ♥</div>' +
    '<div class="pl-actions">' +
    ytBtns +
    '<div class="btn-row">' +
    '<button class="btn btn-gmail" id="mail-btn" onclick="openMail()">📧 Send via Gmail</button>' +
    '</div></div></div></div>';
}

function openMail() {
  var today = new Date().toLocaleDateString("en-US", {weekday:"long",month:"long",day:"numeric"});
  var subject = encodeURIComponent("🎵 Let the Beat DROP — " + today);
  var noteEl = document.getElementById("g-note");
  var note = noteEl ? noteEl.value.trim() : "";
  var ytUrl = state.ytUrl || "";
  var body = (note ? note + "\n\n" : "") +
    (ytUrl ? "▶ Today's Playlist:\n" + ytUrl : "Save to YouTube Music first to include the playlist link!") +
    "\n\n♥ ♪ ♥ ♪ ♥";
  window.open("https://mail.google.com/mail/?view=cm&su=" + subject + "&body=" + encodeURIComponent(body), "_blank");
}

function handleYouTube() {
  if (!state.accessToken) { signInToYouTube(); return; }
  var btn = document.getElementById("yt-btn");
  var mood = document.getElementById("g-mood") ? document.getElementById("g-mood").value.trim() : "";
  var note = document.getElementById("g-note") ? document.getElementById("g-note").value.trim() : "";
  createYouTubePlaylist(mood, note);
}

function signInToYouTube() {
  localStorage.setItem("pending-yt-save", "true");
  var redirectUri = window.location.href.split("#")[0].split("?")[0];
  var authUrl = "https://accounts.google.com/o/oauth2/v2/auth" +
    "?client_id=" + encodeURIComponent(state.clientId) +
    "&redirect_uri=" + encodeURIComponent(redirectUri) +
    "&response_type=token" +
    "&scope=" + encodeURIComponent("https://www.googleapis.com/auth/youtube");
  window.location.href = authUrl;
}

async function createYouTubePlaylist(mood, note) {
  var btn = document.getElementById("yt-btn");
  var resultEl = document.getElementById("yt-result");
  if (btn) { btn.textContent = "⏳ Creating playlist..."; btn.disabled = true; }

  var today = new Date().toLocaleDateString("en-US", {weekday:"long",month:"long",day:"numeric"});
  try {
    var createRes = await fetch("https://www.googleapis.com/youtube/v3/playlists?part=snippet,status", {
      method: "POST",
      headers: { "Authorization": "Bearer " + state.accessToken, "Content-Type": "application/json" },
      body: JSON.stringify({
        snippet: { title: "Let the Beat DROP — " + today + (mood ? " (" + mood + ")" : ""), description: note || "A playlist made with love 💕" },
        status: { privacyStatus: "unlisted" }
      })
    });
    var playlist = await createRes.json();
    if (playlist.error) {
      if (playlist.error.code === 401) {
        state.accessToken = "";
        localStorage.removeItem("yt-access-token");
        if (resultEl) resultEl.innerHTML = '<div class="msg msg-error">Session expired. Please sign in again.</div>';
        if (btn) { btn.textContent = "🎵 Sign in & Save to YouTube Music"; btn.disabled = false; }
        return;
      }
      throw new Error(playlist.error.message);
    }

    var playlistId = playlist.id;
    var added = 0;
    for (var i = 0; i < state.songs.length; i++) {
      try {
        var sr = await fetch("https://www.googleapis.com/youtube/v3/search?part=snippet&q=" + encodeURIComponent(state.songs[i]) + "&type=video&videoCategoryId=10&maxResults=1",
          { headers: { "Authorization": "Bearer " + state.accessToken } });
        var sd = await sr.json();
        var videoId = sd.items && sd.items[0] && sd.items[0].id && sd.items[0].id.videoId;
        if (videoId) {
          await fetch("https://www.googleapis.com/youtube/v3/playlistItems?part=snippet", {
            method: "POST",
            headers: { "Authorization": "Bearer " + state.accessToken, "Content-Type": "application/json" },
            body: JSON.stringify({ snippet: { playlistId: playlistId, resourceId: { kind: "youtube#video", videoId: videoId } } })
          });
          added++;
        }
      } catch(e) {}
    }

    state.ytUrl = "https://music.youtube.com/playlist?list=" + playlistId;
    if (resultEl) resultEl.innerHTML = '<div class="msg msg-success">✓ Playlist created with ' + added + ' songs!<br><a href="' + state.ytUrl + '" target="_blank" style="color:#2563eb;font-weight:700">▶ Open in YouTube Music</a></div>';
    if (btn) { btn.textContent = "🎵 Save to YouTube Music"; btn.disabled = false; }

  } catch(e) {
    if (resultEl) resultEl.innerHTML = '<div class="msg msg-error">Error: ' + e.message + '</div>';
    if (btn) { btn.textContent = "🎵 Save to YouTube Music"; btn.disabled = false; }
  }
}

renderNav();
renderGenerate();
renderProfile();

renderSetup();
renderRate();
setScreen("generate");
</script>
